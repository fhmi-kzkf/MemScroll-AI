server {
    listen 80;
    listen 443 ssl;
    server_name memscroll-api.duckdns.org;

    # --- SSL (sesuaikan path cert Anda) ---
    # ssl_certificate /etc/letsencrypt/live/memscroll-api.duckdns.org/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/memscroll-api.duckdns.org/privkey.pem;

    # Client max body size for PDF uploads
    client_max_body_size 50M;

    location / {
        # Handle CORS preflight (OPTIONS) requests
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' "$http_origin" always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Accept,Authorization,Content-Type,Origin,X-Requested-With' always;
            add_header 'Access-Control-Max-Age' 1728000;
            add_header 'Content-Type' 'text/plain charset=UTF-8';
            add_header 'Content-Length' 0;
            return 204;
        }

        # Forward to FastAPI
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Pass CORS headers from FastAPI through
        add_header 'Access-Control-Allow-Origin' "$http_origin" always;
        add_header 'Access-Control-Allow-Credentials' 'true' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Accept,Authorization,Content-Type,Origin,X-Requested-With' always;
    }
}
